<!DOCTYPE html>
<html>

<head>

<title>Investment Detail</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-4">

<h2 id="investmentName"></h2>

<div class="card">

<div class="card-body">

<h4>Transactions</h4>

<table class="table">

<thead>
<tr>
<th>Type</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>

<tbody id="transactionTable"></tbody>

</table>

</div>

</div>

<div class="card mt-4">

<div class="card-body">

<h4>Add Transaction</h4>

<select
id="transactionType"
class="form-select mb-2">

<option>BUY</option>
<option>SELL</option>

</select>

<input
id="transactionAmount"
type="number"
class="form-control mb-2">

<input
id="transactionDate"
type="date"
class="form-control mb-2">

<button
class="btn btn-success"
onclick="saveTransaction()">

Add Transaction

</button>

</div>

</div>

</div>

<script src="js/api.js"></script>
<script src="js/investment-detail.js"></script>

</body>

</html>

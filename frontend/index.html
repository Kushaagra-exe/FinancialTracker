<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Finance Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="#">Finance Tracker</a>

<div>
<a class="nav-link d-inline" href="index.html">Dashboard</a>
<a class="nav-link d-inline" href="investments.html">Investments</a>
</div>
</div>
</nav>

<div class="container mt-4">

<h2>Portfolio Dashboard</h2>

<div class="row my-4">

<div class="col-md-3">
<div class="card card-stat">
<div class="card-body">
<h6>Total Invested</h6>
<h4 id="totalInvested">₹0</h4>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-stat">
<div class="card-body">
<h6>Current Value</h6>
<h4 id="currentValue">₹0</h4>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-stat">
<div class="card-body">
<h6>Net Profit</h6>
<h4 id="netProfit">₹0</h4>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-stat">
<div class="card-body">
<h6>Total Assets</h6>
<h4 id="assetCount">0</h4>
</div>
</div>
</div>

</div>

<div class="table-container">

<div class="d-flex justify-content-between mb-3">

<h4>Investments</h4>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#investmentModal">

Add Investment

</button>

</div>

<table class="table table-hover">

<thead>

<tr>
<th>Name</th>
<th>Invested</th>
<th>Current</th>
<th>Profit</th>
<th>Return %</th>
</tr>

</thead>

<tbody id="dashboardTable"></tbody>

</table>

</div>

</div>

<div class="modal fade" id="investmentModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Add Investment</h5>
</div>

<div class="modal-body">

<input
class="form-control mb-2"
id="investmentName"
placeholder="Investment Name">

<input
class="form-control mb-2"
id="investmentAmount"
type="number"
placeholder="Amount">

<input
class="form-control"
id="investmentDate"
type="date">

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="saveInvestment()">

Save

</button>

</div>

</div>

</div>

</div>

<div
class="modal fade"
id="valueModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>
Update Current Value
</h5>

</div>

<div class="modal-body">

<input
id="currentValueInput"
type="number"
class="form-control">

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="saveCurrentValue()">

Save

</button>

</div>

</div>

</div>

</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<div
class="modal fade"
id="buyModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>
Add Investment
</h5>

</div>

<div class="modal-body">

<input
id="buyAmount"
type="number"
class="form-control mb-2"
placeholder="Amount">

<input
id="buyDate"
type="date"
class="form-control">

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="saveBuyTransaction()">

Save

</button>

</div>

</div>

</div>

</div>

</body>
</html>
